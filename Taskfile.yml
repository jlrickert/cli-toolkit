# https://taskfile.dev

version: "3"
tasks:
  test:
    cmds:
      - go test ./... {{.CLI_ARGS}}
    sources:
      - ./**/*.go
    silent: true
  release:dry-run:
    desc: "Show what would be released. The actual release runs via GitHub Actions (.github/workflows/release.yml)."
    cmds:
      - |
        echo "Latest tag:    $(git tag --list 'v*' --sort=-version:refname | head -n1)"
        echo "Current HEAD:  $(git rev-parse --short HEAD)"
        echo "Bumped version (cliff): $(git-cliff --bumped-version 2>/dev/null || echo 'unavailable')"
        echo
        echo "To release: trigger the Release workflow on GitHub."
        echo "  gh workflow run release.yml"
    silent: true
